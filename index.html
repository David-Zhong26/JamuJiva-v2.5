    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F5F2ED;
            margin: 0;
            overflow-x: hidden;
            color: #2D4F3E;
        }
        .font-serif {
            font-family: 'Fraunces', serif;
        }
        .font-condensed {
            font-family: 'Barlow Condensed', 'Inter', system-ui, sans-serif;
        }
        .grainy-texture::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/p6.png");
            opacity: 0.12;
            pointer-events: none;
            z-index: 100;
        }
        /* Custom scrollbar for premium feel */
        ::-webkit-scrollbar {
          width: 8px;
        }
        ::-webkit-scrollbar-track {
          background: #F5F2ED;
        }
        ::-webkit-scrollbar-thumb {
          background: #2D4F3E;
          border-radius: 10px;
        }
        html {
            scroll-behavior: smooth;
            background-color: #F5E8CA;
        }
        /* Full-height sections — default uses normal vh (Safari, desktop, etc.) */
        .jj-vh-screen {
            height: 100vh;
            max-height: 100vh;
        }
        .jj-vh-section-220 {
            height: 220vh;
        }
        /* Mobile — fill largest viewport to avoid gaps when browser chrome hides (IG, Chrome, etc.) */
        @media (max-width: 767px) {
            .jj-vh-screen {
                height: 100vh;
                height: 100lvh;
                min-height: 100vh;
                min-height: 100lvh;
                max-height: none;
            }
            .jj-vh-section-220 {
                height: 220vh;
                height: 220lvh;
            }
            .jj-vh-can {
                height: 50vh;
                height: 50lvh;
            }
            #benefits {
                background: linear-gradient(180deg, #eb9c35 0%, #d1eaf5 100%);
            }
        }
        @media (min-width: 640px) and (max-width: 767px) {
            .jj-vh-can-sm {
                height: 58vh;
                height: 58lvh;
            }
        }
        /* Benefits section — infinite horizontal marquee */
        @keyframes jj-benefits-marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .jj-benefits-marquee-track {
            animation: jj-benefits-marquee 55s linear infinite;
            will-change: transform;
        }
        @media (prefers-reduced-motion: reduce) {
            .jj-benefits-marquee-track {
                animation: none;
                transform: none;
                flex-wrap: wrap;
                justify-content: center;
                width: 100%;
                max-width: 100%;
                row-gap: 0.5rem;
            }
            .jj-benefits-marquee-track > span {
                white-space: normal;
                text-align: center;
                justify-content: center;
                padding-left: 1rem;
                padding-right: 1rem;
            }
            .jj-benefits-marquee-track > span:last-child {
                display: none;
            }
        }
    </style>
